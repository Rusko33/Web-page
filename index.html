<style>
  body {
    /* Ruta del archivo */
    background-image: url('animacion.gif');

    /* Asegura que el fondo cubra toda la pantalla */
    background-size: cover;

    /* Evita que la imagen se repita si es pequeña */
    background-repeat: no-repeat;

    /* Mantiene el fondo fijo al hacer scroll */
    background-attachment: fixed;

    /* Centra la animación */
    background-position: center;

    /* Color de respaldo por si el GIF no carga */
    background-color: #000000; 
    
    margin: 0;
    padding: 0;
  }
</style>

<!DOCTYPE html>
<html>
<head>
<style>
  .centrado-absoluto {
    display: flex;
    font-size: 120px;
    justify-content: center; /* Centrado horizontal */
    align-items: center;    /* Centrado vertical */
    height: 100vh;           /* Altura total de la pantalla */
    margin: 0;
  }
</style>
</head>
<body class="centrado-absoluto">
  <h1>OLA</h1>
</body>
</html>
